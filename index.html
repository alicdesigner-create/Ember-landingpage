<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dulce Dorado – Business Service Consultant | Professional Business Support Services at Ember Business Services" />
  <title>Ember Business Services</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="images/Favicon ember.svg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <main class="card-wrapper">
    <div class="card">

      <!-- ── HERO: logo image ── -->
      <section class="hero">
        <img
          src="images/ember-logo.png"
          alt="Ember Business Services logo"
          class="hero-logo"
        />
      </section>

      <!-- ── IDENTITY BAR ── -->
      <section class="identity">
        <h1 class="name">Dulce Dorado</h1>
        <p class="title">Business Service Consultant</p>
      </section>

      <!-- ── TAGLINE ── -->
      <section class="tagline-section">
        <p class="tagline">Professional Business Support Services</p>
      </section>

      <!-- ── CONTACT ── -->
      <section class="contact">
        <a class="contact-item" href="tel:7209486244" aria-label="Call Dulce">
          <span class="contact-icon"><i data-lucide="phone"></i></span>
          <span class="contact-text">
            <span class="contact-label">Call me</span>
            720-948-6244
          </span>
        </a>
        <a class="contact-item" href="sms:7209486244" aria-label="Text Dulce">
          <span class="contact-icon"><i data-lucide="message-square"></i></span>
          <span class="contact-text">
            <span class="contact-label">Text me</span>
            720-948-6244
          </span>
        </a>
        <a class="contact-item" href="mailto:dulce@emberbservices.com" aria-label="Email Dulce">
          <span class="contact-icon"><i data-lucide="mail"></i></span>
          <span class="contact-text">dulce@emberbservices.com</span>
        </a>
        <a class="contact-item" href="https://emberbservices.com" target="_blank" rel="noopener" aria-label="Visit website">
          <span class="contact-icon"><i data-lucide="globe"></i></span>
          <span class="contact-text">emberbservices.com</span>
        </a>
      </section>

      <!-- ── SAVE CONTACT ── -->
      <section class="cta-section">
        <button class="btn-save" id="saveContact" aria-label="Download vCard">
          <span class="btn-icon"><i data-lucide="arrow-down-circle"></i></span>
          <span>SAVE CONTACT</span>
        </button>
      </section>

    </div><!-- /.card -->
  </main>

  <!-- ── FOOTER ── -->
  <footer class="footer">
    <p>GET YOUR OWN DIGITAL BUSINESS CARD AT&nbsp;&nbsp;
      <a href="https://tesographics.com" target="_blank" rel="noopener">Tesographics.com</a>
    </p>
  </footer>

  <script src="js/script.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
